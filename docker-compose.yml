services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: homen
      POSTGRES_USER: homen
      POSTGRES_PASSWORD: homen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    command: uv run python manage.py runserver 0.0.0.0:8000
    ports:
      - "8080:8000"
    volumes:
      - .:/app
      - venv:/app/.venv
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://homen:homen@db:5432/homen
    depends_on:
      - db

volumes:
  postgres_data:
  venv:
